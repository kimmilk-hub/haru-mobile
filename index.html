<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>하루</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f3ee;
  --paper:#ffffff;
  --paper2:#faf8f4;
  --ink:#1a1814;
  --ink2:#3d3830;
  --gray:#8c8070;
  --gray2:#c0b8a8;
  --line:#e8e2d8;
  --line2:#d4cfc4;
  --accent:#2b5c3f;
  --accent2:#e8f2eb;
  --gold:#9c7c30;
  --gold2:#f6efd8;
  --rose:#a03020;
  --rose2:#fdf0eb;
  --blue:#3a6090;
  --blue2:#eef2f8;
  /* 아이젠하워 사분면 */
  --q1:#a03020; --q1b:#fdf0eb; /* 중요+긴급 */
  --q2:#2b5c3f; --q2b:#e8f2eb; /* 중요+비긴급 */
  --q3:#9c7c30; --q3b:#f6efd8; /* 긴급+비중요 */
  --q4:#8c8070; --q4b:#f5f3ee; /* 둘다아님 */
  /* 우선순위 */
  --p1:#a03020; --p2:#9c7c30; --p3:#2b5c3f; --p4:#3a6090; --p5:#8c8070;
  --tab-h:60px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--ink);}

/* ══ 앱 레이아웃 ══ */
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--paper);box-shadow:0 0 40px rgba(0,0,0,.08);position:relative;overflow:hidden;}

/* ══ 헤더 ══ */
.hd{
  padding:calc(var(--safe-top) + 12px) 18px 11px;
  background:var(--paper);border-bottom:1px solid var(--line);
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:50;
}
.hd-brand{font-family:'Nanum Myeongjo',serif;font-size:20px;color:var(--accent);font-weight:700;}
.hd-center{display:flex;align-items:center;gap:8px;}
.hd-ctrl{background:none;border:1px solid var(--line2);color:var(--gray);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.hd-label{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);font-weight:500;min-width:90px;text-align:center;}
.hd-today{background:none;border:1px solid var(--line2);color:var(--gray);padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gray2);transition:background .3s;flex-shrink:0;}
.sync-dot.ok{background:#5a8a5a;}
.sync-dot.syncing{background:var(--gold);animation:blink .6s infinite;}
.sync-dot.err{background:var(--rose);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ══ 탭바 ══ */
.tabbar{
  display:flex;
  height:calc(var(--tab-h) + var(--safe-bot));
  padding-bottom:var(--safe-bot);
  background:var(--paper);border-top:1px solid var(--line);
  flex-shrink:0;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;
  font-size:9px;color:var(--gray);font-family:'Noto Sans KR',sans-serif;
  transition:color .15s;
}
.tab-icon{font-size:18px;line-height:1;}
.tab.active{color:var(--accent);}
.tab.active .tab-icon{transform:translateY(-1px);}

/* ══ 뷰 ══ */
.main{flex:1;overflow:hidden;position:relative;}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:16px;}
.view.active{display:block;}

/* ══ 섹션 공통 ══ */
.sec{padding:16px 16px 0;}
.sec-title{font-family:'Nanum Myeongjo',serif;font-size:17px;color:var(--ink);font-weight:700;margin-bottom:2px;}
.sec-sub{font-size:11px;color:var(--gray);margin-bottom:14px;line-height:1.6;}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray);margin-bottom:8px;font-family:'DM Mono',monospace;}

/* ══ 공통 입력 ══ */
.inp{
  width:100%;background:var(--paper2);border:1px solid var(--line2);border-radius:10px;
  padding:10px 12px;font-size:13px;color:var(--ink);font-family:'Noto Sans KR',sans-serif;
  outline:none;transition:border-color .15s;
}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--gray2);}
textarea.inp{resize:none;line-height:1.6;}

/* ══ 바텀시트 ══ */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.sheet-bg.show{display:flex;}
.sheet{width:100%;max-width:480px;background:var(--paper);border-radius:18px 18px 0 0;padding:0 16px calc(24px + var(--safe-bot));max-height:90vh;overflow-y:auto;}
.sheet-handle{width:36px;height:4px;background:var(--line2);border-radius:2px;margin:12px auto 16px;}
.sheet-title{font-family:'Nanum Myeongjo',serif;font-size:17px;color:var(--ink);margin-bottom:16px;font-weight:700;}
.field-label{font-size:10px;color:var(--gray);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block;font-family:'DM Mono',monospace;}
.field-wrap{margin-bottom:12px;}
.btn-row{display:flex;gap:8px;margin-top:8px;}
.btn-primary{flex:2;background:var(--accent);border:none;border-radius:10px;padding:12px;color:white;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;}
.btn-ghost{flex:1;background:var(--paper2);border:1px solid var(--line2);border-radius:10px;padding:12px;color:var(--ink2);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-danger{width:100%;background:none;border:1px solid var(--rose);border-radius:10px;padding:11px;color:var(--rose);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px;}

/* ══ 빈 상태 ══ */
.empty{text-align:center;padding:32px 20px;color:var(--gray);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-text{font-size:12px;line-height:1.8;}

/* ════════════════════════════
   탭1: 연간
════════════════════════════ */
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 12px;}
.mini-month{background:var(--paper2);border:1px solid var(--line);border-radius:10px;padding:8px 6px;cursor:default;}
.mini-month-title{font-size:11px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:5px;font-family:'Nanum Myeongjo',serif;}
.mini-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mini-dow{font-size:7px;color:var(--gray2);text-align:center;font-family:'DM Mono',monospace;padding-bottom:2px;}
.mini-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--gray);border-radius:50%;cursor:pointer;
  position:relative;transition:background .1s;
}
.mini-day:active{background:var(--line);}
.mini-day.today{background:var(--accent);color:white;font-weight:700;}
.mini-day.has-event{color:var(--ink);font-weight:700;}
.mini-day.has-event::after{content:'';position:absolute;bottom:0px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--gold);}
.mini-day.today.has-event::after{background:white;}
.mini-day.sun{color:#c04030;}
.mini-day.sat{color:#3a6090;}
.mini-day.other{color:var(--gray2);}

/* 연간 이벤트 목록 */
.year-events{padding:0 14px 14px;}
.year-events-title{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--gray);font-family:'DM Mono',monospace;margin-bottom:8px;}
.event-item{
  display:flex;align-items:center;gap:10px;
  background:var(--paper2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;margin-bottom:6px;
}
.event-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray);flex-shrink:0;width:40px;}
.event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.event-text{font-size:13px;color:var(--ink);flex:1;}
.event-del{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:16px;padding:2px 4px;}
.year-add-btn{
  width:calc(100% - 28px);margin:0 14px;
  background:var(--accent2);border:1px dashed var(--accent);border-radius:10px;
  padding:11px;color:var(--accent);font-size:13px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}

/* ════════════════════════════
   탭2: 월간
════════════════════════════ */
.month-dow-row{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 12px 4px;border-bottom:1px solid var(--line);}
.month-dow{font-size:10px;color:var(--gray);text-align:center;font-family:'DM Mono',monospace;}
.month-dow:first-child{color:#c04030;}
.month-dow:last-child{color:#3a6090;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 10px;gap:2px;}
.mc{
  min-height:46px;border-radius:8px;padding:3px;
  cursor:pointer;transition:background .1s;
  display:flex;flex-direction:column;align-items:center;
}
.mc:active{background:var(--line);}
.mc.other .mc-n{color:var(--gray2);}
.mc.today .mc-n{background:var(--accent);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.mc.selected{background:var(--accent2);}
.mc-n{font-size:12px;color:var(--ink);font-weight:500;margin-bottom:2px;line-height:22px;}
.mc-n.sun{color:#c04030;}
.mc-n.sat{color:#3a6090;}
.mc-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.mc-dot{width:4px;height:4px;border-radius:50%;}

/* 월간 선택된 날 패널 */
.day-panel{
  margin:8px 12px;padding:12px 14px;
  background:var(--paper2);border:1px solid var(--line);border-radius:12px;
  display:none;
}
.day-panel.show{display:block;}
.day-panel-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.day-panel-go{font-size:11px;color:var(--accent);cursor:pointer;}
.day-panel-block{font-size:11px;color:var(--ink2);padding:5px 8px;background:white;border-radius:6px;margin-bottom:4px;border-left:3px solid var(--accent);}
.day-panel-event{font-size:11px;color:var(--gold);padding:4px 8px;background:var(--gold2);border-radius:6px;margin-bottom:4px;}
.day-panel-empty{font-size:11px;color:var(--gray);font-style:italic;}

/* ════════════════════════════
   탭3: 주간 (브레인덤프 + 드래그)
════════════════════════════ */
.week-nav{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);}
.week-nav-label{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);font-weight:500;}

/* 주간 진행률 */
.week-progress{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.wp-label{font-size:11px;color:var(--gray);flex-shrink:0;}
.wp-bar{flex:1;height:5px;background:var(--line2);border-radius:3px;overflow:hidden;}
.wp-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
.wp-pct{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray);flex-shrink:0;width:30px;text-align:right;}

/* 브레인덤프 영역 */
.wk-dump-area{padding:12px 16px;border-bottom:1px solid var(--line);}
.wk-dump-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--gray);font-family:'DM Mono',monospace;margin-bottom:8px;text-transform:uppercase;}
.wk-dump-inp-row{display:flex;gap:8px;margin-bottom:8px;}
.wk-dump-inp{flex:1;}
.wk-dump-add{background:var(--accent);border:none;border-radius:10px;padding:10px 16px;color:white;font-size:18px;cursor:pointer;line-height:1;}
.wk-dump-pool{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;}
.dump-chip{
  display:flex;align-items:center;gap:5px;
  background:var(--paper2);border:1.5px solid var(--line2);border-radius:20px;
  padding:6px 10px;font-size:12px;color:var(--ink);
  cursor:grab;user-select:none;
  transition:all .15s;touch-action:none;
}
.dump-chip:active{cursor:grabbing;box-shadow:0 4px 12px rgba(0,0,0,.12);transform:scale(1.03);}
.dump-chip.dragging{opacity:.4;}
.dump-chip-del{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;}
.dump-chip.assigned{border-style:dashed;opacity:.55;}

/* 아이젠하워 4분면 드롭존 */
.ei-section{padding:10px 12px 16px;}
.ei-section-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--gray);font-family:'DM Mono',monospace;margin-bottom:8px;text-transform:uppercase;}
.ei-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ei-quad{
  border:1.5px solid var(--line);border-radius:12px;padding:10px;
  min-height:80px;transition:all .2s;
}
.ei-quad.drag-over{border-color:var(--accent);background:var(--accent2);transform:scale(1.02);}
.ei-quad-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.ei-quad-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ei-quad-title{font-size:10px;font-weight:700;color:var(--ink2);font-family:'DM Mono',monospace;line-height:1.3;}
.ei-task{
  display:flex;align-items:flex-start;gap:6px;
  padding:5px 7px;border-radius:7px;margin-bottom:4px;
  background:white;border:1px solid var(--line);
  cursor:grab;touch-action:none;
}
.ei-task:active{cursor:grabbing;}
.ei-task.dragging{opacity:.4;}
.ei-cb{
  width:14px;height:14px;border-radius:3px;border:1.5px solid var(--line2);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:transparent;transition:all .13s;cursor:pointer;
}
.ei-cb.done{color:white;}
.ei-task-text{font-size:11px;color:var(--ink);line-height:1.4;flex:1;}
.ei-task-text.done{text-decoration:line-through;color:var(--gray);}
.ei-task-del{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:12px;padding:0 1px;flex-shrink:0;}
.ei-quad-empty{font-size:10px;color:var(--gray2);text-align:center;padding:8px 0;font-style:italic;}


/* ════════════════════════════
   탭4: 일간
════════════════════════════ */

/* TOP 5 */
.top5-section{padding:14px 16px 0;}
.top5-title{font-family:'Nanum Myeongjo',serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.top5-sub{font-size:11px;color:var(--gray);margin-bottom:12px;}
.top5-slot{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;margin-bottom:6px;
  border:1.5px solid var(--line);background:var(--paper2);
  cursor:pointer;transition:all .13s;min-height:44px;
}
.top5-slot.filled{background:var(--paper);border-color:var(--line2);}
.top5-slot:active{background:var(--line);}
.top5-rank{
  font-family:'Nanum Myeongjo',serif;font-size:18px;font-weight:800;
  width:20px;text-align:center;flex-shrink:0;
}
.top5-task-text{font-size:13px;color:var(--ink);flex:1;line-height:1.4;}
.top5-empty-text{font-size:12px;color:var(--gray2);flex:1;}
.top5-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;flex-shrink:0;transition:all .13s;}
.top5-check.done{color:white;}
.top5-slot.done-slot .top5-task-text{text-decoration:line-through;color:var(--gray);}
.top5-slot-actions{display:flex;gap:4px;}
.top5-remove{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:15px;padding:2px;}

/* 나머지 할 일 (주간에서 미배정) */
.remain-section{padding:12px 16px 0;}
.remain-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:8px;background:var(--paper2);
  border:1px solid var(--line);margin-bottom:5px;cursor:pointer;
}
.remain-quad-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.remain-text{font-size:12px;color:var(--gray);flex:1;}
.remain-add-today{font-size:10px;color:var(--accent);background:var(--accent2);border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* 타임박스 (일간 하단) */
.timebox-section{padding:14px 16px 0;border-top:1px solid var(--line);margin-top:14px;}
.timebox-toggle{
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;margin-bottom:8px;
}
.timebox-toggle-title{font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:700;color:var(--ink);}
.timebox-toggle-arrow{font-size:12px;color:var(--gray);transition:transform .2s;}
.timebox-toggle-arrow.open{transform:rotate(180deg);}
.timebox-body{display:none;}
.timebox-body.open{display:block;}

/* 타임라인 */
.timeline{position:relative;padding:0 0 20px;}
.hour-row{display:flex;align-items:flex-start;min-height:52px;position:relative;}
.hour-label{width:42px;padding-top:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2);flex-shrink:0;text-align:right;padding-right:8px;}
.hour-line{flex:1;border-top:1px solid var(--line);padding-top:4px;padding-bottom:4px;min-height:52px;position:relative;}
.hour-row.now-row .hour-line{border-top:2px solid var(--accent);}
.block-pill{
  margin:2px 6px 2px 0;border-radius:8px;padding:6px 10px;
  cursor:pointer;transition:all .13s;border:none;width:calc(100% - 6px);text-align:left;
  display:flex;align-items:center;gap:8px;
}
.block-pill:active{filter:brightness(.95);}
.bp-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;}
.bp-check.done{color:white;background:rgba(0,0,0,.2);}
.bp-title{font-size:12px;font-weight:500;flex:1;line-height:1.3;}
.bp-title.done{text-decoration:line-through;opacity:.6;}
.bp-time{font-family:'DM Mono',monospace;font-size:9px;opacity:.7;flex-shrink:0;}

/* 타임박스 추가 버튼 */
.fab{
  position:fixed;right:calc(50% - 224px);
  bottom:calc(var(--tab-h) + var(--safe-bot) + 14px);
  width:50px;height:50px;border-radius:50%;
  background:var(--accent);border:none;color:white;font-size:24px;
  cursor:pointer;box-shadow:0 4px 16px rgba(43,92,63,.35);
  display:none;align-items:center;justify-content:center;z-index:100;
}
.fab.show{display:flex;}

/* ════════════════════════════
   탭5: 회고
════════════════════════════ */
.review-section{padding:14px 16px 0;}
.review-card{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
.rc-label{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.rc-hint{font-size:10px;color:var(--gray);margin-bottom:8px;}
.review-ta{width:100%;background:none;border:none;font-size:13px;color:var(--ink);font-family:'Noto Sans KR',sans-serif;line-height:1.7;resize:none;outline:none;min-height:60px;}
.energy-row{display:flex;gap:6px;margin-top:6px;}
.enrg-btn{flex:1;background:var(--paper2);border:1.5px solid var(--line);border-radius:8px;padding:7px 4px;font-size:16px;cursor:pointer;text-align:center;transition:all .13s;}
.enrg-btn.on{border-color:var(--accent);background:var(--accent2);}

<script>
// ══════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════
const SB_URL='https://nbwjgyhhyhupjcjyqush.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5id2pneWhoeWh1cGpjanlxdXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDAzNTQsImV4cCI6MjA4ODI3NjM1NH0.2aHOtIFH2luVMT0TkToOz4X0vrCRBBPVBzbU1q4bVbo';
const sb=supabase.createClient(SB_URL,SB_KEY);

function setSyncStatus(s){
  const d=document.getElementById('sync-dot');
  d.className='sync-dot'+(s==='ok'?' ok':s==='syncing'?' syncing':s==='err'?' err':'');
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayD(){const d=new Date();d.setHours(0,0,0,0);return d;}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
const KO_DAYS=['일','월','화','수','목','금','토'];
const COLORS=['#5b7fa6','#6b9e72','#a06b6b','#9070a8','#b08c3c','#5b9e9e','#707070'];
const QUAD_META={
  q1:{label:'중요 + 긴급',dot:'#a03020',bg:'#fdf0eb',cb:'#a03020'},
  q2:{label:'중요 + 여유',dot:'#2b5c3f',bg:'#e8f2eb',cb:'#2b5c3f'},
  q3:{label:'긴급 + 비중요',dot:'#9c7c30',bg:'#f6efd8',cb:'#9c7c30'},
  q4:{label:'나중에',dot:'#8c8070',bg:'#f5f3ee',cb:'#8c8070'},
};
const RANK_COLORS=['#a03020','#9c7c30','#2b5c3f','#3a6090','#8c8070'];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let curTab='tab1';
let curYear=new Date().getFullYear();
let curMonth=new Date().getMonth(); // 0-indexed
let curWeekMonday=getWeekMonday(todayD());
let curDate=todayD();

// 데이터
let events=[];       // [{id,date:dk,text,color}]  연간 이벤트
let weekly={};       // {weekKey: [{id,text,quad,done}]}
let daily={};        // {dk: {top5:[{id,text,fromWeekId,done}], blocks:[...], review:{...}}}
let saveTimer=null;

function getWeekMonday(d){
  const dd=new Date(d);
  const dow=dd.getDay();
  dd.setDate(dd.getDate()-(dow===0?6:dow-1));
  dd.setHours(0,0,0,0);
  return dd;
}
function weekKey(monday){return`week-${dk(monday)}`;}
function getWeekDays(monday){
  return Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
}
function getDay(d=curDate){
  const k=dk(d);
  if(!daily[k])daily[k]={top5:[],blocks:[],review:{energy:0,good:'',bad:'',learn:'',next:'',oneliner:''}};
  if(!daily[k].review)daily[k].review={energy:0,good:'',bad:'',learn:'',next:'',oneliner:''};
  return daily[k];
}
function getWeek(monday=curWeekMonday){
  const k=weekKey(monday);
  if(!weekly[k])weekly[k]=[];
  return weekly[k];
}

// ══════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveAll,900);}
async function saveAll(){
  setSyncStatus('syncing');
  try{
    await sb.from('diary_days').upsert({date:'__haru_v2__',data:{events,weekly,daily}},{onConflict:'date'});
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}
async function loadAll(){
  setSyncStatus('syncing');
  try{
    const{data,error}=await sb.from('diary_days').select('data').eq('date','__haru_v2__').single();
    if(error&&error.code!=='PGRST116')throw error;
    if(data?.data){
      events=data.data.events||[];
      weekly=data.data.weekly||{};
      daily=data.data.daily||{};
    }
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

// ══════════════════════════════════════════
// 탭 전환 & 헤더
// ══════════════════════════════════════════
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  const map={tab1:'view1',tab2:'view2',tab3:'view3',tab4:'view4',tab5:'view5'};
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(map[tab]).classList.add('active');
  document.getElementById('fab').classList.toggle('show',tab==='tab4');
  updateHeader();
  if(tab==='tab1')renderYear();
  if(tab==='tab2')renderMonth();
  if(tab==='tab3')renderWeek();
  if(tab==='tab4')renderDay();
  if(tab==='tab5')renderReview();
}

function updateHeader(){
  const prevBtn=document.getElementById('hd-prev');
  const nextBtn=document.getElementById('hd-next');
  const todayBtn=document.getElementById('hd-today-btn');
  const label=document.getElementById('hd-label');
  prevBtn.style.display='flex';nextBtn.style.display='flex';
  todayBtn.style.display='block';
  if(curTab==='tab1'){
    label.textContent=`${curYear}년`;
    prevBtn.onclick=()=>{curYear--;renderYear();updateHeader();};
    nextBtn.onclick=()=>{curYear++;renderYear();updateHeader();};
    todayBtn.onclick=()=>{curYear=new Date().getFullYear();renderYear();updateHeader();};
  }else if(curTab==='tab2'){
    label.textContent=`${curYear}.${String(curMonth+1).padStart(2,'0')}`;
    prevBtn.onclick=()=>{curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderMonth();updateHeader();};
    nextBtn.onclick=()=>{curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderMonth();updateHeader();};
    todayBtn.onclick=()=>{const t=new Date();curYear=t.getFullYear();curMonth=t.getMonth();renderMonth();updateHeader();};
  }else if(curTab==='tab3'){
    const days=getWeekDays(curWeekMonday);
    label.textContent=`${days[0].getMonth()+1}/${days[0].getDate()}–${days[6].getMonth()+1}/${days[6].getDate()}`;
    prevBtn.onclick=()=>{curWeekMonday.setDate(curWeekMonday.getDate()-7);curWeekMonday=new Date(curWeekMonday);renderWeek();updateHeader();};
    nextBtn.onclick=()=>{curWeekMonday.setDate(curWeekMonday.getDate()+7);curWeekMonday=new Date(curWeekMonday);renderWeek();updateHeader();};
    todayBtn.onclick=()=>{curWeekMonday=getWeekMonday(todayD());renderWeek();updateHeader();};
  }else if(curTab==='tab4'||curTab==='tab5'){
    const isToday=dk(curDate)===dk(todayD());
    label.textContent=`${curDate.getMonth()+1}/${curDate.getDate()} (${KO_DAYS[curDate.getDay()]})${isToday?' · 오늘':''}`;
    prevBtn.onclick=()=>{curDate.setDate(curDate.getDate()-1);curDate=new Date(curDate);loadDayData();};
    nextBtn.onclick=()=>{curDate.setDate(curDate.getDate()+1);curDate=new Date(curDate);loadDayData();};
    todayBtn.onclick=()=>{curDate=todayD();loadDayData();};
  }
}

async function loadDayData(){
  updateHeader();
  if(curTab==='tab4')renderDay();
  if(curTab==='tab5')renderReview();
}

// ══════════════════════════════════════════
// 연간 뷰
// ══════════════════════════════════════════
let evColor='#9c7c30';
let editEvId=null;

function renderYear(){
  const todayKey=dk(todayD());
  const wrap=document.getElementById('year-grid-wrap');
  // 이벤트 있는 날 집합
  const eventDates=new Set(events.map(e=>e.date));
  let html='<div class="year-grid">';
  for(let m=0;m<12;m++){
    const firstDay=new Date(curYear,m,1);
    const lastDay=new Date(curYear,m+1,0).getDate();
    const startDow=firstDay.getDay();
    html+=`<div class="mini-month"><div class="mini-month-title">${m+1}월</div><div class="mini-month-grid">`;
    ['일','월','화','수','목','금','토'].forEach(d=>html+=`<div class="mini-dow">${d}</div>`);
    for(let i=0;i<startDow;i++)html+=`<div class="mini-day other"></div>`;
    for(let d=1;d<=lastDay;d++){
      const dd=new Date(curYear,m,d);
      const key=dk(dd);
      const dow=dd.getDay();
      const isToday=key===todayKey;
      const hasEv=eventDates.has(key);
      const cls=['mini-day',isToday?'today':'',hasEv?'has-event':'',dow===0&&!isToday?'sun':dow===6&&!isToday?'sat':''].filter(Boolean).join(' ');
      html+=`<div class="${cls}" onclick="yearDayClick('${key}')">${d}</div>`;
    }
    html+=`</div></div>`;
  }
  html+='</div>';
  wrap.innerHTML=html;

  // 이벤트 목록
  document.getElementById('year-events-label').textContent=`${curYear}년 이벤트 · 기념일`;
  const evList=events.filter(e=>e.date.startsWith(curYear+'')).sort((a,b)=>a.date.localeCompare(b.date));
  const el=document.getElementById('year-event-list');
  if(!evList.length){
    el.innerHTML=`<div class="empty"><div class="empty-text">아직 등록된 이벤트가 없어요</div></div>`;
    return;
  }
  el.innerHTML=evList.map(e=>{
    const d=parseDate(e.date);
    return`<div class="event-item">
      <div class="event-date">${d.getMonth()+1}/${d.getDate()}</div>
      <div class="event-dot" style="background:${e.color||'#9c7c30'}"></div>
      <div class="event-text">${e.text}</div>
      <button class="event-del" onclick="openEventSheet('${e.id}')">✎</button>
    </div>`;
  }).join('');
}

function yearDayClick(key){

  document.getElementById('ev-date').value=key;

}

function openEventSheet(id=null,prefillDate=null){

    if(!ev)return;

}
function saveEvent(){
  const date=document.getElementById('ev-date').value;
  const text=document.getElementById('ev-text').value.trim();
  if(!date||!text)return;
  if(editEvId){
    const ev=events.find(e=>e.id===editEvId);

  }else{
    events.push({id:uid(),date,text,color:evColor});

function deleteEvent(){

}

let selectedDayKey=null;

function renderMonth(){
  const todayKey=dk(todayD());
  const firstDay=new Date(curYear,curMonth,1);
  const lastDay=new Date(curYear,curMonth+1,0).getDate();
  const startDow=firstDay.getDay();
  const prevLast=new Date(curYear,curMonth,0).getDate();
  const eventDates=new Set(events.map(e=>e.date));

  const grid=document.getElementById('month-grid');
  let html='';

  // 이전달
  for(let i=startDow-1;i>=0;i--){
    html+=`<div class="mc other"><div class="mc-n">${prevLast-i}</div></div>`;
  }
  // 이번달
  for(let d=1;d<=lastDay;d++){
    const dd=new Date(curYear,curMonth,d);
    const key=dk(dd);
    const isToday=key===todayKey;
    const isSel=key===selectedDayKey;
    const dow=dd.getDay();
    const dayData=daily[key];
    const blocks=dayData?.blocks||[];
    const colors=[...new Set(blocks.map(b=>b.color||'#2b5c3f'))].slice(0,3);
    const hasEv=eventDates.has(key);
    const numCls='mc-n'+(dow===0?' sun':dow===6?' sat':'');
    html+=`<div class="mc${isToday?' today':''}${isSel?' selected':''}" id="mc-${key}" onclick="selectDay('${key}')">
      <div class="${numCls}">${d}</div>
      <div class="mc-dots">
        ${colors.map(c=>`<div class="mc-dot" style="background:${c}"></div>`).join('')}
        ${hasEv?`<div class="mc-dot" style="background:var(--gold)"></div>`:''}
      </div>
    </div>`;
  }
  // 다음달
  const remain=(7-((startDow+lastDay)%7))%7;
  for(let d=1;d<=remain;d++)html+=`<div class="mc other"><div class="mc-n">${d}</div></div>`;

  grid.innerHTML=html;
  if(selectedDayKey)showDayPanel(selectedDayKey);
  else document.getElementById('day-panel').classList.remove('show');
}

function selectDay(key){
  selectedDayKey=key;
  document.querySelectorAll('.mc').forEach(c=>c.classList.remove('selected'));
  const cell=document.getElementById('mc-'+key);
  if(cell)cell.classList.add('selected');
  showDayPanel(key);
}

function showDayPanel(key){
  const panel=document.getElementById('day-panel');
  const [y,m,d]=key.split('-').map(Number);
  const dayData=daily[key];
  const dayEvents=events.filter(e=>e.date===key);
  const blocks=dayData?.blocks||[];
  const top5=dayData?.top5||[];

  let html=`<div class="day-panel-title">
    ${m}월 ${d}일 (${KO_DAYS[new Date(y,m-1,d).getDay()]})
    <span class="day-panel-go" onclick="goToDay('${key}')">일간으로 →</span>
  </div>`;

  if(dayEvents.length){
    dayEvents.forEach(e=>{
      html+=`<div class="day-panel-event">🎉 ${e.text}</div>`;
    });
  }
  if(top5.length){
    top5.forEach((t,i)=>{
      html+=`<div class="day-panel-block" style="border-color:${RANK_COLORS[i]||'var(--accent)'};">${t.done?'✓ ':''}${t.text}</div>`;
    });
  }else if(!dayEvents.length){
    html+=`<div class="day-panel-empty">기록이 없어요</div>`;
  }
  panel.innerHTML=html;
  panel.classList.add('show');
}

function goToDay(key){
  const[y,m,d]=key.split('-').map(Number);
  curDate=new Date(y,m-1,d);
  switchTab('tab4');
}

// ══════════════════════════════════════════
// 주간 뷰 — 브레인덤프 + 드래그
// ══════════════════════════════════════════
// weekly[weekKey] = {
//   dump: [{id, text}],           ← 미분류 풀
//   quad: {q1:[{id,text,done}], q2:[], q3:[], q4:[]}
// }

function getWeekData(monday=curWeekMonday){
  const k=weekKey(monday);
  if(!weekly[k])weekly[k]={dump:[],quad:{q1:[],q2:[],q3:[],q4:[]}};
  if(!weekly[k].dump)weekly[k].dump=[];
  if(!weekly[k].quad)weekly[k].quad={q1:[],q2:[],q3:[],q4:[]};
  ['q1','q2','q3','q4'].forEach(q=>{if(!weekly[k].quad[q])weekly[k].quad[q]=[];});
  return weekly[k];
}

// 이전 형식 호환 (배열이면 마이그레이션)
function migrateWeek(monday=curWeekMonday){
  const k=weekKey(monday);
  if(Array.isArray(weekly[k])){
    const old=weekly[k];
    weekly[k]={dump:[],quad:{q1:[],q2:[],q3:[],q4:[]}};
    old.forEach(t=>{ weekly[k].quad[t.quad||'q4'].push({id:t.id,text:t.text,done:t.done||false}); });
  }
}

function addDumpChip(){
  const inp=document.getElementById('wk-inp');
  const text=inp.value.trim();if(!text)return;
  migrateWeek();
  const wd=getWeekData();
  wd.dump.push({id:uid(),text});
  inp.value='';
  renderWeek();scheduleSave();
}
document.getElementById('wk-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addDumpChip();});

function renderWeek(){
  migrateWeek();
  const wd=getWeekData();
  const allQuadTasks=[...wd.quad.q1,...wd.quad.q2,...wd.quad.q3,...wd.quad.q4];
  const total=allQuadTasks.length;
  const done=allQuadTasks.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('week-progress-fill').style.width=pct+'%';
  document.getElementById('week-progress-pct').textContent=pct+'%';

  // 덤프 풀 렌더
  const assignedIds=new Set(allQuadTasks.map(t=>t.id));
  const pool=document.getElementById('wk-dump-pool');
  pool.innerHTML=wd.dump.length
    ? wd.dump.map(chip=>{
        const assigned=assignedIds.has(chip.id);
        return`<div class="dump-chip${assigned?' assigned':''}"
          draggable="true"
          data-id="${chip.id}"
          data-text="${chip.text.replace(/"/g,'&quot;')}"
          id="chip-${chip.id}">
          ${chip.text}
          <button class="dump-chip-del" onclick="removeChip('${chip.id}')">×</button>
        </div>`;
      }).join('')
    : `<div style="font-size:11px;color:var(--gray2);padding:4px 0;">할 일을 입력하고 Enter를 누르세요</div>`;

  // 4분면 렌더
  const grid=document.getElementById('ei-grid');
  grid.innerHTML=Object.entries(QUAD_META).map(([q,qm])=>{
    const tasks=wd.quad[q]||[];
    return`<div class="ei-quad" id="quad-${q}"
      data-quad="${q}"
      ondragover="quadDragOver(event)"
      ondragleave="quadDragLeave(event)"
      ondrop="quadDrop(event,'${q}')"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event,'${q}')">
      <div class="ei-quad-header">
        <div class="ei-quad-dot" style="background:${qm.dot}"></div>
        <div class="ei-quad-title">${qm.label}</div>
      </div>
      ${tasks.length
        ? tasks.map(t=>`<div class="ei-task"
            draggable="true"
            data-id="${t.id}"
            data-text="${t.text.replace(/"/g,'&quot;')}"
            data-from="${q}"
            id="qtask-${t.id}">
            <div class="ei-cb${t.done?' done':''}" style="${t.done?`background:${qm.dot};border-color:${qm.dot}`:`border-color:${qm.dot}`}" onclick="toggleQuadTask('${q}','${t.id}')">✓</div>
            <div class="ei-task-text${t.done?' done':''}">${t.text}</div>
            <button class="ei-task-del" onclick="removeQuadTask('${q}','${t.id}')">×</button>
          </div>`).join('')
        : `<div class="ei-quad-empty">드래그해서 놓기</div>`}
    </div>`;
  }).join('');

  // 드래그 이벤트 칩에 붙이기
  setupDragEvents();
}

// ── 드래그 & 드롭 (마우스/터치 통합) ──
let dragId=null, dragText=null, dragFrom=null; // dragFrom: 'dump' or quadKey
let touchChip=null, touchClone=null;

function setupDragEvents(){
  // 덤프 칩
  document.querySelectorAll('.dump-chip[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      dragId=el.dataset.id; dragText=el.dataset.text; dragFrom='dump';
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    // 터치
    el.addEventListener('touchstart',touchStart,{passive:true});
  });
  // 사분면 내 태스크
  document.querySelectorAll('.ei-task[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      dragId=el.dataset.id; dragText=el.dataset.text; dragFrom=el.dataset.from;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('touchstart',touchStart,{passive:true});
  });
}

function quadDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function quadDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function quadDrop(e,q){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragId)return;
  dropToQuad(q);
}
function dropToQuad(targetQ){
  migrateWeek();
  const wd=getWeekData();
  // 이미 같은 분면이면 스킵
  if(dragFrom===targetQ)return;
  // 원래 분면에서 제거
  if(dragFrom&&dragFrom!=='dump'){
    wd.quad[dragFrom]=(wd.quad[dragFrom]||[]).filter(t=>t.id!==dragId);
  }
  // 이미 다른 분면에 있으면 거기서도 제거
  ['q1','q2','q3','q4'].forEach(q=>{
    if(q!==targetQ) wd.quad[q]=(wd.quad[q]||[]).filter(t=>t.id!==dragId);
  });
  // 대상 분면에 없으면 추가
  if(!wd.quad[targetQ].find(t=>t.id===dragId)){
    wd.quad[targetQ].push({id:dragId,text:dragText,done:false});
  }
  dragId=null;dragText=null;dragFrom=null;
  renderWeek();scheduleSave();
}

// ── 터치 드래그 ──
let touchStartX=0,touchStartY=0,touchTargetQ=null;
function touchStart(e){
  const el=e.currentTarget;
  dragId=el.dataset.id; dragText=el.dataset.text;
  dragFrom=el.dataset.from||'dump';
  touchChip=el;
  const t=e.touches[0];
  touchStartX=t.clientX; touchStartY=t.clientY;
  // 클론 생성
  touchClone=el.cloneNode(true);
  touchClone.style.cssText=`position:fixed;z-index:9999;pointer-events:none;opacity:.85;transform:scale(1.05);font-size:12px;padding:6px 10px;background:white;border:1.5px solid var(--accent);border-radius:20px;`;
  touchClone.style.left=(t.clientX-40)+'px';
  touchClone.style.top=(t.clientY-20)+'px';
  document.body.appendChild(touchClone);
  el.classList.add('dragging');
}
function touchMove(e){
  if(!touchClone)return;
  const t=e.touches[0];
  touchClone.style.left=(t.clientX-40)+'px';
  touchClone.style.top=(t.clientY-20)+'px';
  // 어떤 분면 위에 있는지
  touchClone.style.display='none';
  const el=document.elementFromPoint(t.clientX,t.clientY);
  touchClone.style.display='';
  const quad=el?.closest('.ei-quad');
  document.querySelectorAll('.ei-quad').forEach(q=>q.classList.remove('drag-over'));
  if(quad){quad.classList.add('drag-over');touchTargetQ=quad.dataset.quad;}
  else touchTargetQ=null;
}
function touchEnd(e,q){
  if(touchClone){touchClone.remove();touchClone=null;}
  if(touchChip)touchChip.classList.remove('dragging');
  document.querySelectorAll('.ei-quad').forEach(q=>q.classList.remove('drag-over'));
  if(touchTargetQ){dropToQuad(touchTargetQ);}
  touchTargetQ=null;touchChip=null;
}

function removeChip(id){
  migrateWeek();
  const wd=getWeekData();
  wd.dump=wd.dump.filter(c=>c.id!==id);
  ['q1','q2','q3','q4'].forEach(q=>{ wd.quad[q]=(wd.quad[q]||[]).filter(t=>t.id!==id); });
  renderWeek();scheduleSave();
}
function toggleQuadTask(q,id){
  const wd=getWeekData();
  const t=(wd.quad[q]||[]).find(x=>x.id===id);
  if(t){t.done=!t.done;}
  renderWeek();scheduleSave();
}
function removeQuadTask(q,id){
  const wd=getWeekData();
  wd.quad[q]=(wd.quad[q]||[]).filter(t=>t.id!==id);
  renderWeek();scheduleSave();
}

// getWeek 호환 (일간에서 주간 할 일 읽을 때)
function getWeekTasks(monday=curWeekMonday){
  migrateWeek(monday);
  const wd=getWeekData(monday);
  return [...(wd.quad.q1||[]),...(wd.quad.q2||[]),...(wd.quad.q3||[]),...(wd.quad.q4||[])];
}
function getWeekTaskQuad(id,monday=curWeekMonday){
  const wd=getWeekData(monday);
  for(const q of['q1','q2','q3','q4']){
    if((wd.quad[q]||[]).find(t=>t.id===id))return q;
  }
  return'q4';
}

function removeTop5(idx){

  day.top5.splice(idx,1);
  renderTop5();scheduleSave();
}

function openTop5Sheet(slot){
  top5SheetSlot=slot;
  const wk=getWeekMonday(curDate);
  const weekTasks=getWeekTasks(wk);
  const day=getDay();
  const usedWeekIds=new Set((day.top5||[]).filter(Boolean).map(t=>t.fromWeekId).filter(Boolean));
  const usedDumpIds=new Set((day.top5||[]).filter(Boolean).map(t=>t.fromDayDumpId).filter(Boolean));

  document.getElementById('top5-sheet-title').textContent=`${slot+1}순위 선택`;
  const list=document.getElementById('top5-pick-list');

  const availWeek=weekTasks.filter(t=>!t.done&&!usedWeekIds.has(t.id));
  const availDump=(day.dump||[]).filter(d=>!usedDumpIds.has(d.id));

  let html='';

  // 오늘 덤프
  if(availDump.length){
    html+=`<div style="font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--gray);font-family:'DM Mono',monospace;text-transform:uppercase;margin-bottom:6px;">오늘 브레인덤프</div>`;
    html+=availDump.map(d=>`
      <div style="display:flex;align-items:center;gap:8px;background:var(--gold2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:5px;cursor:pointer;" onclick="selectTop5DayDump('${d.id}','${d.text.replace(/'/g,"\\'")}')">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;"></div>
        <div style="font-size:13px;color:var(--ink);flex:1;">${d.text}</div>
      </div>`).join('');
  }

  // 주간 할 일
  if(availWeek.length){
    html+=`<div style="font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--gray);font-family:'DM Mono',monospace;text-transform:uppercase;margin:10px 0 6px;">주간 할 일</div>`;
    html+=availWeek.map(t=>{
      const q=getWeekTaskQuad(t.id,wk);
      const qm=QUAD_META[q]||QUAD_META.q4;
      return`<div style="display:flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:5px;cursor:pointer;" onclick="selectTop5Task('${t.id}','${t.text.replace(/'/g,"\\'")}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${qm.dot};flex-shrink:0;"></div>
        <div style="font-size:13px;color:var(--ink);flex:1;">${t.text}</div>
      </div>`;
    }).join('');
  }

  if(!availDump.length&&!availWeek.length){
    html=`<div class="empty"><div class="empty-text">할 일이 없어요<br>위쪽 덤프나 주간 탭에서 먼저 추가해보세요</div></div>`;
  }

  list.innerHTML=html;
  document.getElementById('top5-direct-inp').value='';
  document.getElementById('top5-sheet').classList.add('show');
}

function selectTop5Task(weekId,text){
  const day=getDay();
  while(day.top5.length<=top5SheetSlot)day.top5.push(null);
  day.top5[top5SheetSlot]={id:uid(),text,fromWeekId:weekId,fromDayDumpId:null,done:false};
  closeSheet('top5-sheet');
  renderTop5();renderDayDump();scheduleSave();
}

function selectTop5DayDump(dumpId,text){
  const day=getDay();
  while(day.top5.length<=top5SheetSlot)day.top5.push(null);
  day.top5[top5SheetSlot]={id:uid(),text,fromWeekId:null,fromDayDumpId:dumpId,done:false};
  closeSheet('top5-sheet');
  renderTop5();renderDayDump();scheduleSave();
}

function addTop5Direct(){
  const inp=document.getElementById('top5-direct-inp');
  const text=inp.value.trim();if(!text)return;
  const day=getDay();
  while(day.top5.length<=top5SheetSlot)day.top5.push(null);
  day.top5[top5SheetSlot]={id:uid(),text,fromWeekId:null,fromDayDumpId:null,done:false};
  closeSheet('top5-sheet');
  renderTop5();scheduleSave();
}

// 나머지 (주간 중 오늘 미배정)
function renderRemain(){
  const wk=getWeekMonday(curDate);
  const tasks=getWeekTasks(wk);
  const day=getDay();
  const usedIds=day.top5.filter(Boolean).map(t=>t.fromWeekId).filter(Boolean);
  const remain=tasks.filter(t=>!t.done&&!usedIds.includes(t.id));
  const el=document.getElementById('remain-list');
  if(!remain.length){
    el.innerHTML=`<div style="font-size:11px;color:var(--gray2);padding:4px 0;">모두 배정됐어요 ✓</div>`;
    return;
  }
  el.innerHTML=remain.map(t=>{
    const q=getWeekTaskQuad(t.id,wk);
    const qm=QUAD_META[q]||QUAD_META.q4;
    return`<div class="remain-item">
      <div class="remain-quad-dot" style="background:${qm.dot}"></div>
      <div class="remain-text">${t.text}</div>
      <button class="remain-add-today" onclick="quickAddToTop5('${t.id}','${t.text.replace(/'/g,"\\'")}')">오늘 추가</button>
    </div>`;
  }).join('');
}

function quickAddToTop5(weekId,text){
  const day=getDay();
  if(day.top5.filter(Boolean).length>=5)return;
  // 빈 슬롯 찾기
  let slot=day.top5.findIndex(t=>!t);
  if(slot===-1){if(day.top5.length<5)slot=day.top5.length;else return;}
  while(day.top5.length<slot)day.top5.push(null);
  day.top5[slot]={id:uid(),text,fromWeekId:weekId,done:false};
  renderDay();scheduleSave();
}

// 타임라인 (일간 블록)
let editBlockId=null;
let blColor=COLORS[0];

function renderTimeline(){
  const day=getDay();
  const blocks=day.blocks||[];
  const el=document.getElementById('timeline');
  const HOURS=Array.from({length:24},(_,i)=>i);
  const nowH=new Date().getHours();
  const isToday=dk(curDate)===dk(todayD());
  el.innerHTML=HOURS.map(h=>{
    const hBlocks=blocks.filter(b=>parseInt(b.start)===h||parseInt(b.start?.split(':')[0])===h);
    return`<div class="hour-row${isToday&&h===nowH?' now-row':''}">
      <div class="hour-label">${h===0?'':h+':00'}</div>
      <div class="hour-line">
        ${hBlocks.map(b=>`<button class="block-pill" style="background:${b.color||'#2b5c3f'}20;color:${b.color||'#2b5c3f'}" onclick="openBlockSheet('${b.id}')">
          <div class="bp-check${b.done?' done':''}" style="${b.done?`background:${b.color||'#2b5c3f'};border-color:${b.color||'#2b5c3f'}`:`border-color:${b.color||'#2b5c3f'}`}" onclick="event.stopPropagation();toggleBlock('${b.id}')">✓</div>
          <div class="bp-title${b.done?' done':''}" style="color:${b.color||'#2b5c3f'}">${b.title}</div>
          <div class="bp-time" style="color:${b.color||'#2b5c3f'}">${b.start}–${b.end}</div>
        </button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderDailyStats(){
  const day=getDay();
  const top5Done=day.top5.filter(t=>t?.done).length;
  const top5Total=day.top5.filter(Boolean).length;
  const blDone=(day.blocks||[]).filter(b=>b.done).length;
  const blTotal=(day.blocks||[]).length;
  document.getElementById('daily-stats').innerHTML=
    `<span>TOP5: ${top5Done}/${top5Total}</span><span style="color:var(--line2)">|</span><span>블록: ${blDone}/${blTotal}</span>`;
}

function toggleTimebox(){
  const body=document.getElementById('timebox-body');
  const arrow=document.getElementById('tb-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open',body.classList.contains('open'));
}

function openBlockSheet(id=null){
  editBlockId=id;
  blColor=COLORS[0];
  const day=getDay();
  // TOP5 목록을 select에
  const sel=document.getElementById('bl-task-select');
  const top5=day.top5.filter(Boolean);
  sel.innerHTML=`<option value="">직접 입력…</option>`+top5.map(t=>`<option value="${t.text}">${t.text}</option>`).join('');
  if(id){
    const b=(day.blocks||[]).find(x=>x.id===id);
    if(!b)return;
    sel.value=b.title;
    if(!sel.value){sel.options[0].text=b.title;sel.value='';}
    document.getElementById('bl-start').value=b.start||'09:00';
    document.getElementById('bl-end').value=b.end||'10:00';
    blColor=b.color||COLORS[0];
    document.getElementById('bl-del-btn').style.display='block';
    document.getElementById('block-sheet-title').textContent='블록 수정';
  }else{
    sel.value='';
    document.getElementById('bl-del-btn').style.display='none';
    document.getElementById('block-sheet-title').textContent='블록 추가';
  }
  renderColorPicker('bl-colors',blColor,c=>{blColor=c;});
  document.getElementById('block-sheet').classList.add('show');
}

function saveBlock(){
  const sel=document.getElementById('bl-task-select');
  const title=sel.value||sel.options[sel.selectedIndex]?.text||'';
  if(!title||title==='직접 입력…')return;
  const start=document.getElementById('bl-start').value;
  const end=document.getElementById('bl-end').value;
  const day=getDay();
  if(!day.blocks)day.blocks=[];
  if(editBlockId){
    const b=day.blocks.find(x=>x.id===editBlockId);
    if(b){b.title=title;b.start=start;b.end=end;b.color=blColor;}
  }else{
    day.blocks.push({id:uid(),title,start,end,color:blColor,done:false});
  }
  closeSheet('block-sheet');renderTimeline();renderDailyStats();scheduleSave();
}
function deleteBlock(){
  const day=getDay();
  day.blocks=(day.blocks||[]).filter(x=>x.id!==editBlockId);
  closeSheet('block-sheet');renderTimeline();renderDailyStats();scheduleSave();
}
function toggleBlock(id){
  const day=getDay();
  const b=(day.blocks||[]).find(x=>x.id===id);
  if(b){b.done=!b.done;}
  renderTimeline();renderDailyStats();scheduleSave();
}

// 색상 피커
function renderColorPicker(containerId,selected,onChange){
  const el=document.getElementById(containerId);
  el.innerHTML=COLORS.map(c=>`<div onclick="pickColor(this,'${containerId}')" data-c="${c}" style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2.5px solid ${c===selected?'var(--ink)':'transparent'};transition:border-color .1s;"></div>`).join('');
  el._onChange=onChange;
}
function pickColor(el,containerId){
  const c=el.dataset.c;
  document.querySelectorAll(`#${containerId} div`).forEach(s=>s.style.borderColor=s.dataset.c===c?'var(--ink)':'transparent');
  const wrap=document.getElementById(containerId);
  if(containerId==='bl-colors')blColor=c;
}

// 회고
// ══════════════════════════════════════════
function renderReview(){
  const day=getDay();
  const r=day.review;
  const isToday=dk(curDate)===dk(todayD());
  document.getElementById('review-date-sub').textContent=
    `${curDate.getMonth()+1}월 ${curDate.getDate()}일 (${KO_DAYS[curDate.getDay()]})${isToday?' · 오늘':''}`;
  document.getElementById('r-good').value=r.good||'';
  document.getElementById('r-bad').value=r.bad||'';
  document.getElementById('r-learn').value=r.learn||'';
  document.getElementById('r-next').value=r.next||'';
  document.getElementById('r-oneliner').value=r.oneliner||'';
  document.querySelectorAll('.enrg-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.e)===(r.energy||0)));
}

document.querySelectorAll('.enrg-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    const v=parseInt(b.dataset.e);
    getDay().review.energy=v;
    document.querySelectorAll('.enrg-btn').forEach(x=>x.classList.toggle('on',parseInt(x.dataset.e)===v));
    scheduleSave();
  });
});
['good','bad','learn','next','oneliner'].forEach(k=>{
  const el=document.getElementById('r-'+k);
  if(el)el.addEventListener('input',()=>{getDay().review[k]=el.value;scheduleSave();});
});
