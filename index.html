function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2200);
}

// ════════════════════════════
// INIT
// ════════════════════════════
// ════════════════════════════
// 알람 시스템
// ════════════════════════════
let alarmTimers=[];

function toggleAlarmField(){
  const on=document.getElementById('ev-alarm-on').checked;
  document.getElementById('ev-alarm-label').textContent=on?'알람 설정됨':'알람 없음';
  const fields=document.getElementById('ev-alarm-fields');
  fields.style.display=on?'block':'none';
}

function openEvSheet(id=null,prefill=null){
  editEvId=id; evColor=COLORS[0]; selectedEmoji='';
  initEmojiPicker();
  // 알람 초기화
  document.getElementById('ev-alarm-on').checked=false;
  document.getElementById('ev-alarm-fields').style.display='none';
  document.getElementById('ev-alarm-label').textContent='알람 없음';
  document.getElementById('ev-alarm-time').value='08:00';
  document.getElementById('ev-alarm-before').value='30';

  if(id){
    const e=events.find(x=>x.id===id);if(!e)return;
    document.getElementById('ev-date').value=e.date;
    document.getElementById('ev-text').value=e.text;
    evColor=e.color||COLORS[0];
    selectedEmoji=e.emoji||'';
    document.getElementById('ev-emoji-preview').textContent=selectedEmoji;
    renderEmojiGrid();
    // 알람 복원
    if(e.alarm){
      document.getElementById('ev-alarm-on').checked=true;
      document.getElementById('ev-alarm-fields').style.display='block';
      document.getElementById('ev-alarm-label').textContent='알람 설정됨';
      document.getElementById('ev-alarm-time').value=e.alarm.time||'08:00';
      document.getElementById('ev-alarm-before').value=String(e.alarm.before??30);
    }
    document.getElementById('ev-del').style.display='block';
    document.getElementById('ev-sheet-title').textContent='이벤트 수정';
  } else {
    if(prefill)document.getElementById('ev-date').value=prefill;
    else document.getElementById('ev-date').value='';
    document.getElementById('ev-text').value='';
    document.getElementById('ev-del').style.display='none';
    document.getElementById('ev-sheet-title').textContent='이벤트 추가';
  }
  renderColors('ev-colors',evColor,c=>{evColor=c;});
  document.getElementById('ev-sheet').classList.add('show');
}

function saveEv(){
  const date=document.getElementById('ev-date').value;
  const text=document.getElementById('ev-text').value.trim();
  if(!date||!text)return;
  const emoji=selectedEmoji||'';
  const alarmOn=document.getElementById('ev-alarm-on').checked;
  const alarm=alarmOn?{
    on:true,
    time:document.getElementById('ev-alarm-time').value,
    before:parseInt(document.getElementById('ev-alarm-before').value)||0
  }:null;
  if(editEvId){
    const e=events.find(x=>x.id===editEvId);
    if(e){e.date=date;e.text=text;e.color=evColor;e.emoji=emoji;e.alarm=alarm;}
  } else {
    events.push({id:uid(),date,text,color:evColor,emoji,alarm});
  }
  closeSheet('ev-sheet');renderYear();scheduleSave();
  scheduleAlarms();
}

// 알람 스케줄링
function scheduleAlarms(){
  // 기존 타이머 전부 해제
  alarmTimers.forEach(t=>clearTimeout(t));
  alarmTimers=[];

  const now=new Date();
  const todayK=dk(now);

  events.forEach(ev=>{
    if(!ev.alarm?.on)return;
    // 알람 발생 시각 계산: ev.date + ev.alarm.time - ev.alarm.before(분)
    const [y,m,d]=ev.date.split('-').map(Number);
    const [ah,am]=ev.alarm.time.split(':').map(Number);
    const alarmDate=new Date(y,m-1,d,ah,am,0,0);
    alarmDate.setMinutes(alarmDate.getMinutes()-ev.alarm.before);

    const diff=alarmDate-now;
    if(diff<0)return; // 이미 지난 알람
    if(diff>7*24*60*60*1000)return; // 7일 이후는 스케줄 안 함

    const t=setTimeout(()=>fireAlarm(ev), diff);
    alarmTimers.push(t);
  });
}

function fireAlarm(ev){
  const [y,m,d]=ev.date.split('-').map(Number);
  const title=`${ev.emoji||'🔔'} ${ev.text}`;
  const body=`${m}월 ${d}일 일정`;

  // 브라우저 알림
  if(Notification.permission==='granted'){
    new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">🔔</text></svg>'});
  }

  // 인앱 배너 (항상 표시)
  showAlarmBanner(title,body);
}

function showAlarmBanner(title,body){
  // 기존 배너 제거
  document.querySelectorAll('.alarm-banner').forEach(b=>b.remove());
  const banner=document.createElement('div');
  banner.className='alarm-banner';
  banner.innerHTML=`<span class="alarm-bell">🔔</span><div><div style="font-weight:700;font-size:13px;">${title}</div><div style="font-size:11px;opacity:.85;">${body}</div></div><button class="alarm-banner-close" onclick="this.parentElement.remove()">×</button>`;
  document.body.appendChild(banner);
  // 10초 후 자동 제거
  setTimeout(()=>banner.remove(), 10000);
}

// 오늘 일정 요약 (앱 열릴 때)
function showTodaySummary(){
  const todayK=dk(new Date());
  const todayEvs=events.filter(e=>e.date===todayK);
  if(!todayEvs.length)return;
  const text=todayEvs.map(e=>`${e.emoji||'🗓️'} ${e.text}`).join('  ·  ');
  showAlarmBanner(`오늘 일정 ${todayEvs.length}개`,text);
}

// 알람 권한 요청
async function requestNotificationPerm(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'){
    await Notification.requestPermission();
  }
}

// ════════════════════════════
// 백업 / 복원
// ════════════════════════════
function toggleHdMenu(){
  const m=document.getElementById('hd-menu');
  m.classList.toggle('show');
  // 바깥 클릭 시 닫기
  if(m.classList.contains('show')){
    setTimeout(()=>document.addEventListener('click',closeHdMenuOnce,{once:true}),10);
  }
}
function closeHdMenuOnce(e){
  if(!e.target.closest('#hd-menu')&&!e.target.closest('#hd-menu-btn')){
    document.getElementById('hd-menu').classList.remove('show');
  }
}

function exportBackup(){
  document.getElementById('hd-menu').classList.remove('show');
  const data={
    _version:3,
    _exported:new Date().toISOString(),
    events,projects,weekly,daily,stickers,routines
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=dk(new Date()).replace(/-/g,'');
  a.href=url;a.download=`하루-백업-${date}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('백업 파일 저장됨 ✓');
}

function importBackup(input){
  document.getElementById('hd-menu').classList.remove('show');
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data._version)throw new Error('올바른 백업 파일이 아니에요');
      if(!confirm(`${data._exported?.slice(0,10)} 백업으로 복원할까요?\n현재 데이터는 덮어씌워져요.`))return;
      events=data.events||[];
      projects=data.projects||[];
      weekly=data.weekly||{};
      daily=data.daily||{};
      stickers=data.stickers||[];
      routines=data.routines||[];
      saveAll();
      renderStickers();
      switchTab(curTab);
      toast('복원 완료 ✓');
    }catch(err){
      alert('백업 파일을 읽을 수 없어요: '+err.message);
    }
  };
  reader.readAsText(file);
  input.value=''; // 같은 파일 재선택 가능하게
}

function confirmClearAll(){
  document.getElementById('hd-menu').classList.remove('show');
  if(!confirm('⚠️ 모든 데이터를 삭제할까요?\n이 작업은 되돌릴 수 없어요.'))return;
  if(!confirm('정말로 삭제할까요?'))return;
  events=[];projects=[];weekly={};daily={};stickers=[];routines=[];
  saveAll();renderStickers();switchTab(1);
  toast('전체 초기화 완료');
}

async function init(){
  await loadAll();
  renderStickers();
  switchTab(1);
  await requestNotificationPerm();
  scheduleAlarms();
  showTodaySummary();
}
init();
